site_name: XAUTOMATA Documentation
site_description: Documentation for the use of XAUTOMATA Services
site_url: https://xautomata.github.io/User-Interface-Manual/

theme:
  favicon: images/logo.png
  name: material
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.tooltips
    - navigation.sections
    - navigation.top
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - toc.follow
    - header.autohide

  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: blue
      accent: indigo
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: indigo
      accent: blue

repo_name: XAUTOMATA User Interface Documentation

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: it
          name: Italiano
          build: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption


nav:

  - Home: index.md

  # -------------------------------------------------------
  # SECTION 1 — GETTING STARTED
  # Login and first navigation.
  # Source: Login.md (from colleague), overview.md (from colleague)
  # -------------------------------------------------------
  - Getting Started:
      - Login: getting_started/login.md
      - Navigating the Interface: getting_started/navigation.md

  # -------------------------------------------------------
  # SECTION 2 — DASHBOARDS
  # How to access, use and manage dashboards.
  # Source: overview.md (from colleague, covers dashboard home)
  #         dashboard management pages (written in this session)
  # -------------------------------------------------------
  - Dashboards:
      - Overview: dashboards/index.md
      - Dashboard Management: dashboards/management.md
      - IT Infrastructure: dashboards/it_infrastructure.md
      - Network: dashboards/network.md
      - Cloud Cost: dashboards/cloud_cost.md

  # -------------------------------------------------------
  # SECTION 3 — WIDGETS
  # Reference guide for all available widgets.
  # Source: widget_*.md files from colleague — kept as-is,
  # reorganized into subfolders by functional domain.
  # -------------------------------------------------------
  - Widgets:
      - Widget Overview: widgets/overview.md

      - Infrastructure Monitoring:
          - IT Infrastructure: widgets/it_infrastructure.md
          - IT Analytics: widgets/it_analytics.md
          - IT Anomalies: widgets/it_anomalies.md

      - Network Governance:
          - Network: widgets/network.md
          - Network Analytics: widgets/network_analytics.md
          - Net Flow: widgets/net_flow.md

      - Service Management:
          - Support Service KPI: widgets/support_service_kpi.md

      - Cost Governance:
