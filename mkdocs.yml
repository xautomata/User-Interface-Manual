  # -------------------------------------------------------
  # SECTION 7 — SUPER ADMIN
  # Advanced platform management. Restricted access.
  # -------------------------------------------------------
  - Super Admin:
      - Widgets: super_admin/widgets.md
      - Widget Groups: super_admin/widget_groups.md
      - Dashboards: super_admin/dashboards.md
