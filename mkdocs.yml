      # - Dedicated Widgets:
      #     - MCD Dedicated: widgets/mcd_dedicated.md
      #     - MCD Massive Reboot: widgets/mcd_reboot.md
      #     - MCD Rebuild VM: widgets/mcd_rebuild_vm.md
      #     - MCD Massive Downtime: widgets/mcd_downtime.md

  # -------------------------------------------------------
  # SECTION 4 — DATA MANAGER
  # Configuration of the monitored infrastructure entities.
  # -------------------------------------------------------
  - Data Manager:
      - Overview: data_manager/overview.md
      - Working with Entities: data_manager/working_with_entities.md
      - Tree Hierarchy View: data_manager/tree_hierarchy_view.md

      - Customers:
          - Customers: data_manager/customers/customers.md
          - Sites: data_manager/customers/sites.md
          - Contacts: data_manager/customers/contacts.md

      - Objects Repository:
          - Groups: data_manager/objects/groups.md
          - Objects: data_manager/objects/objects.md
          - Metric Types: data_manager/objects/metric_types.md
          - Metrics: data_manager/objects/metrics.md
          - Services: data_manager/objects/services.md

      - Monitoring Operations:
          - Calendars: data_manager/monitoring/calendars.md
          - Downtimes: data_manager/monitoring/downtimes.md
          - Dispatchers: data_manager/monitoring/dispatchers.md

  # -------------------------------------------------------
  # SECTION 5 — COST MANAGEMENT
  # Cloud cost registration and cost views.
  # -------------------------------------------------------
  - Cost Management:
      - Overview: cost_management/overview.md
      - Cloud Cost Registration: cost_management/cloud_cost_registration.md
      - Cost Views: cost_management/cost_views.md

  # -------------------------------------------------------
  # SECTION 6 — ADMINISTRATION
  # Platform configuration for administrators.
  # -------------------------------------------------------
  - Administration:
      - Overview: administration/overview.md
      - Access Control: administration/access_control.md
      - Users: administration/users.md
      - Virtual Domains: administration/virtual_domains.md
      - Probes: administration/probes.md
      - Probe Types: administration/probe_types.md
      - Messages: administration/messages.md
      - Notification Providers: administration/notification_providers.md
